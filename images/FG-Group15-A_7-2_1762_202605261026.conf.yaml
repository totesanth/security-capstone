    hostname: "FG-Group15-A"
    management-port-use-admin-sport: disable
    switch-controller: enable

system_accprofile:
    - prof_admin:
        secfabgrp: read-write
        ftviewgrp: read-write
        authgrp: read-write
        sysgrp: read-write
        netgrp: read-write
        loggrp: read-write
        fwgrp: read-write
        vpngrp: read-write
        utmgrp: read-write
        wifi: read-write

    - mypolicy:
        secfabgrp: read-write
        ftviewgrp: read-write
        authgrp: read-write
        sysgrp: read-write
        netgrp: read-write
        loggrp: read-write
        fwgrp: read-write
        vpngrp: read-write
        utmgrp: read-write
        wifi: read-write


system_npu:

system_interface:
    - wan1:
        vdom: "root"
        mode: dhcp
        allowaccess: ping https ssh http
        type: physical
        alias: "Internet"
        role: wan
        snmp-index: 1

    - wan2:
        vdom: "root"
        ip: 1.1.15.1 255.255.255.0
        allowaccess: ping https ssh http
        type: physical
        alias: "Site to Site"
        role: wan
        snmp-index: 2

    - dmz:
        vdom: "root"
        ip: 10.10.10.1 255.255.255.0
        allowaccess: ping https http fabric
        type: physical
        role: dmz
        snmp-index: 3

    - internal1:
        vdom: "root"
        type: physical
        snmp-index: 8

    - internal2:
        vdom: "root"
        ip: 192.168.15.1 255.255.255.0
        allowaccess: ping https ssh snmp http
        type: physical
        alias: "Port 2 / MGMT"
        device-identification: enable
        lldp-transmission: enable
        role: lan
        snmp-index: 9

    - internal3:
        vdom: "root"
        ip: 192.168.20.1 255.255.255.0
        allowaccess: ping https ssh http
        type: physical
        alias: "Port 3"
        role: dmz
        snmp-index: 10

    - internal4:
        vdom: "root"
        type: physical
        snmp-index: 11

    - internal5:
        vdom: "root"
        type: physical
        snmp-index: 12

    - internal6:
        vdom: "root"
        type: physical
        snmp-index: 13

    - internal7:
        vdom: "root"
        type: physical
        snmp-index: 14

    - modem:
        vdom: "root"
        mode: pppoe
        status: down
        type: physical
        snmp-index: 4

    - naf.root:
        vdom: "root"
        type: tunnel
        src-check: disable
        snmp-index: 15

    - l2t.root:
        vdom: "root"
        type: tunnel
        snmp-index: 16

    - ssl.root:
        vdom: "root"
        type: tunnel
        alias: "SSL VPN interface"
        snmp-index: 5

    - internal:
        vdom: "root"
        ip: 192.168.1.99 255.255.255.0
        allowaccess: ping https ssh http fabric
        type: hard-switch
        stp: enable
        role: lan
        snmp-index: 6

    - fortilink:
        vdom: "root"
        fortilink: enable
        ip: 169.254.1.1 255.255.255.0
        allowaccess: ping fabric
        type: hard-switch
        lldp-reception: enable
        lldp-transmission: enable
        snmp-index: 7

    - Site to Site:
        vdom: "root"
        type: tunnel
        snmp-index: 17
        interface: "wan2"

    - Remote Access:
        vdom: "root"
        type: tunnel
        snmp-index: 18
        interface: "internal2"


system_physical-switch:
    - sw0:
        age-val: 0


system_virtual-switch:
    - internal:
        physical-switch: "sw0"
        port:
            - internal1:

            - internal4:

            - internal5:

            - internal6:

            - internal7:



    - fortilink:
        physical-switch: "sw0"


