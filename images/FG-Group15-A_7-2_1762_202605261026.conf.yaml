webfilter_search-engine:
    - google:
        hostname: ".*\\.google\\..*"
        url: "^\\/((custom|search|images|videosearch|webhp)\\?)"
        query: "q="
        safesearch: url
        safesearch-str: "&safe=active"

    - yahoo:
        hostname: ".*\\.yahoo\\..*"
        url: "^\\/search(\\/video|\\/images){0,1}(\\?|;)"
        query: "p="
        safesearch: url
        safesearch-str: "&vm=r"

    - bing:
        hostname: ".*\\.bing\\..*"
        url: "^(\\/images|\\/videos)?(\\/search|\\/async|\\/asyncv2)\\?"
        query: "q="
        safesearch: header

    - yandex:
        hostname: "yandex\\..*"
        url: "^\\/((yand|images\\/|video\\/)(search)|search\\/)\\?"
        query: "text="
        safesearch: url
        safesearch-str: "&family=yes"

    - youtube:
        hostname: ".*youtube.*"
        safesearch: header

    - baidu:
        hostname: ".*\\.baidu\\.com"
        url: "^\\/s?\\?"
        query: "wd="

    - baidu2:
        hostname: ".*\\.baidu\\.com"
        url: "^\\/(ns|q|m|i|v)\\?"
        query: "word="

    - baidu3:
        hostname: "tieba\\.baidu\\.com"
        url: "^\\/f\\?"
        query: "kw="

    - vimeo:
        hostname: ".*vimeo.*"
        url: "^\\/search\\?"
        query: "q="
        safesearch: header

    - yt-scan-1:
        url: "www.youtube.com/user/"
        safesearch: yt-scan

    - yt-scan-2:
        url: "www.youtube.com/youtubei/v1/browse"
        safesearch: yt-scan

    - yt-scan-3:
        url: "www.youtube.com/youtubei/v1/player"
        safesearch: yt-scan

    - yt-scan-4:
        url: "www.youtube.com/youtubei/v1/navigator"
        safesearch: yt-scan

    - yt-channel:
        url: "www.youtube.com/channel"
        safesearch: yt-channel

    - yt-pattern:
        url: "youtube.com/channel/"
        safesearch: yt-pattern

    - twitter:
        hostname: "twitter\\.com"
        url: "^\\/i\\/api\\/graphql\\/.*\\/UserByScreenName"
        query: "variables="
        safesearch: translate
        safesearch-str: "regex::%22screen_name%22:%22([A-Za-z0-9_]{4,15})%22::twitter.com/\\1"

    - google-translate-1:
        hostname: "translate\\.google\\..*"
        url: "^\\/translate"
        query: "u="
        safesearch: translate
        safesearch-str: "regex::(?:\\?|&)u=([^&]+)::\\1"

    - google-translate-2:
        hostname: ".*\\.translate\\.goog"
        url: "^\\/"
        safesearch: translate
        safesearch-str: "case::google-translate"


